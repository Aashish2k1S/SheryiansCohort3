<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Dex</title>
    <link rel="stylesheet" href="style.css">
    <link preconnect href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>    
    <link rel="icon" href="./assets/pokeLogo.png" type="image/png">
</head>
<body>
    <div class="main">
        
        <img src="./assets/top-right.jpg" alt="pattern" class="top-right">
        <img src="./assets/bottom-left.jpg" alt="pattern" class="bottom-left">
        <img src="./assets/bottom-right.jpg" alt="pattern" class="bottom-right">

        <nav>
            <div><i class="ri-menu-fill"></i></div>
            <img src="./assets/logo.png" alt="Pokémon Logo">
            <div><i class="ri-sun-line"></i></div>
        </nav>

        <header>
            <div class="search">
                <i class="ri-search-line"></i> <input type="text" placeholder="Search Pokémon...">
            </div>
            <div class="filter">
                <div class="filter-item">
                    <span>Filter</span>                    
                    <i class="ri-arrow-down-s-line"></i>
                </div>
                <div class="sort"><i class="ri-sort-desc"></i></div>
            </div>
        </header>

        <div class="hero">


        </div>

        <div class="tab">
            
        </div>

        <footer>
            <img src="./assets/pokeLogo.png" alt="Pokémon Logo">
            <p>&copy; 2026 Pokémon. All rights reserved.</p>
        </footer>

    </div>
    
</body>
</html>
