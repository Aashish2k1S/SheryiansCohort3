<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dark">

    <!-- #region DASHBOARD -->
    <div id="dashboard">
        <div class="top">
            <p>PRODUCTIVITY DASHBOARD</p>
        </div>
        <div class="below">
            <div class="card">
                <div class="left">
                    <div>
                        <h4>5 July, 2026</h4>
                        <h1>Sunday, 06:00:00 PM</h1>
                    </div>
                    <h3>Location</h3>
                </div>
                <div class="right">
                    <div>
                        <h2>31.2° C</h2>
                        <h2>Partly Cloudy nearby</h2>
                    </div>
                    <div>
                        <h4>Heat_Index: 35.6%</h4>
                        <h4>Humidity: 60%</h4>
                        <h4>Wind: 19.8km/h</h4>
                    </div>
                </div>
            </div>
        </div>
        <div id="sideBar"></div>
    </div>
    <!-- #endregion DASHBOARD -->

    <!-- #region TODO -->
    <div id="todo">todo</div>
    <!-- #endregion TODO -->

    <!-- #region DAILY PLAN -->
    <div id="plan">daily plan</div>
    <!-- #endregion DAILY PLAN -->

    <!-- #region QUOTES -->
    <div id="quotes"></div>
    <!-- #endregion QUOTES -->

    <!-- #region TIMER -->
    <div id="timer">timer</div>
    <!-- #endregion TIMER -->

    <!-- #region GOALS -->
    <div id="goals">goals</div>
    <!-- #endregion GOALS -->

    <script src="script.js"></script>
</body>

</html>
